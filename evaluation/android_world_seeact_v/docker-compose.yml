version: "3.9"

services:
  emu1:
    image: android_world:latest
    container_name: emu1
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    networks: [emunet]
    environment:
      AVD_NAME: Pixel_6_API_33_1
      GPU_MODE: swiftshader_indirect
      API_PORT: "5000"
    command: >
      bash -lc "
        set -euo pipefail;
        emulator -avd $${AVD_NAME:-Pixel_6_API_33}
                 -no-window -gpu $${GPU_MODE:-swiftshader_indirect}
                 -no-audio -no-boot-anim &
        adb wait-for-device;
        adb shell 'while [[ -z $(getprop sys.boot_completed | tr -d "\r") ]]; do sleep 1; done; input keyevent 82';
        adb shell settings put system pointer_location 0 --user 0;
        uvicorn app:app --host 0.0.0.0 --port $${API_PORT:-5000}
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 90s
    restart: unless-stopped

