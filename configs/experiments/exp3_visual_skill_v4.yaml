benchmark: offline

env:
  OPENAI_MODEL: gpt-5.4-nano
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_API_KEY: ${OPENAI_API_KEY}

  SELECTOR_MODEL: gpt-5.4-nano
  SELECTOR_API_BASE: https://api.openai.com/v1
  SELECTOR_API_KEY: ${OPENAI_API_KEY}
  VISUAL_SKILL_STORE_PATH: outputs/visual_skills/mind2web_v4

args:
  benchmark: multimodal_mind2web
  input_file: data/offline/mind2web_eval_100.jsonl
  output_file: outputs/offline/exp3_visual_skill_v4_predictions_100.jsonl
  blocks: data/mind2web_blocks_images/release_images/cross_task
  model: gpt-5.4-nano
  api_base: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}
  temperature: 0.0
