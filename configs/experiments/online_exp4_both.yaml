benchmark: online_mind2web

env:
  OPENAI_API_KEY: ${OPENAI_API_KEY}

args:
  - --tasks_path
  - evaluation/online-mind2web-eval/configs/mind2web.100.jsonl
  - --gpt.model
  - gpt-5.4-nano
  - --gpt.openai_api_base
  - https://api.openai.com/v1
  - --gpt.openai_api_key
  - ${OPENAI_API_KEY}
  - --gpt.temperature
  - "0.0"
  - --num_processes
  - "1"
  - --max_steps
  - "30"
  - --history_last_k
  - "15"
  - --output
  - outputs/online_mind2web/exp4_both
  - --memory_model
  - gpt-5.4-nano
  - --memory_api_base
  - https://api.openai.com/v1
  - --memory_api_key
  - ${OPENAI_API_KEY}
  - --memory_recent_k
  - "3"
  - --selector_model
  - gpt-5.4-nano
  - --selector_api_base
  - https://api.openai.com/v1
  - --selector_api_key
  - ${OPENAI_API_KEY}
  - --visual_skill_store_path
  - outputs/visual_skills/mind2web_v4
  - --blocked_exit_streak
  - "2"
