# GUIMem launcher config for Online-Mind2Web.
# The adapter uses simpleArgParser dotted fields, so args are listed exactly as
# command-line tokens.
benchmark: online_mind2web

env:
  OPENAI_API_KEY: ${OPENAI_API_KEY}

args:
  - --tasks_path
  - evaluation/online-mind2web-eval/configs/mind2web.300.jsonl
  - --gpt.model
  - gpt-4o-mini
  - --gpt.openai_api_base
  - https://api.openai.com/v1
  - --gpt.openai_api_key
  - ${OPENAI_API_KEY}
  - --gpt.temperature
  - "0.0"
  - --num_processes
  - "1"
  - --max_steps
  - "30"
  - --history_last_k
  - "15"
  - --output
  - outputs/online_mind2web_guimem
  - --memory_model
  - gpt-4o-mini
  - --memory_api_base
  - https://api.openai.com/v1
  - --memory_api_key
  - ${OPENAI_API_KEY}
  - --memory_recent_k
  - "3"
  - --selector_model
  - gpt-4o-mini
  - --selector_api_base
  - https://api.openai.com/v1
  - --selector_api_key
  - ${OPENAI_API_KEY}
  - --experience_catalog_path
  - outputs/cross_task_experience/catalog.json
  - --experience_library_path
  - outputs/cross_task_experience/experience_library.jsonl
